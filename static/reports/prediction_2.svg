<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="600" height="400" rx="16" fill="#0D1117" />
        <rect x="0.5" y="0.5" width="599" height="399" rx="15.5" stroke="#30363D" stroke-opacity="0.5" />
        
        <text x="35" y="45" font-family="'Inter', system-ui, sans-serif" font-weight="800" font-size="22" fill="#FFFFFF">HDI Well-Being Report</text>
        <text x="35" y="68" font-family="'Inter', system-ui, sans-serif" font-weight="400" font-size="12" fill="#8B949E">Country: India | Model: RandomForestRegressor (HDI Score Predictor)</text>
        
        <rect x="35" y="95" width="220" height="270" rx="12" fill="#161B22" stroke="#21262D" />
        <text x="145" y="160" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-weight="800" font-size="52" fill="#FAD961">0.632</text>
        <text x="145" y="190" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-weight="700" font-size="12" fill="#FFFFFF">PREDICTED HDI SCORE</text>
        
        <rect x="55" y="220" width="180" height="30" rx="15" fill="#FAD96115" stroke="#FAD961" stroke-opacity="0.3" />
        <text x="145" y="239" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-weight="600" font-size="11" fill="#FAD961">Medium Human Development</text>
        
        <text x="145" y="295" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-weight="400" font-size="10" fill="#8B949E">Formula: ³√(LEI × EI × II)</text>
        <text x="145" y="335" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-weight="400" font-size="9" fill="#8B949E">Prediction ID: #2</text>
        
