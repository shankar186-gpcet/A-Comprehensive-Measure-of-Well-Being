        <text x="290" y="150" font-family="'Inter', system-ui, sans-serif" font-weight="600" font-size="12" fill="#C9D1D9">Life Expectancy Index (LEI)</text>
        <text x="565" y="150" text-anchor="end" font-family="'Inter', system-ui, sans-serif" font-weight="700" font-size="12" fill="#00F2FE">0.726</text>
        <rect x="290" y="162" width="275" height="10" rx="5" fill="#21262D" />
        <rect x="290" y="162" width="199.7" height="10" rx="5" fill="url(#lei_grad)" />
        
        <text x="290" y="220" font-family="'Inter', system-ui, sans-serif" font-weight="600" font-size="12" fill="#C9D1D9">Education Index (EI)</text>
        <text x="565" y="220" text-anchor="end" font-family="'Inter', system-ui, sans-serif" font-weight="700" font-size="12" fill="#7F00FF">0.554</text>
        <rect x="290" y="232" width="275" height="10" rx="5" fill="#21262D" />
        <rect x="290" y="232" width="152.3" height="10" rx="5" fill="url(#ei_grad)" />
        
        <text x="290" y="280" font-family="'Inter', system-ui, sans-serif" font-weight="600" font-size="12" fill="#C9D1D9">Income Index (II)</text>
        <text x="565" y="280" text-anchor="end" font-family="'Inter', system-ui, sans-serif" font-weight="700" font-size="12" fill="#FF007F">0.633</text>
        <rect x="290" y="292" width="275" height="10" rx="5" fill="#21262D" />
        <rect x="290" y="292" width="174.0" height="10" rx="5" fill="url(#ii_grad)" />
        
        <text x="290" y="340" font-family="'Inter', system-ui, sans-serif" font-weight="400" font-size="11" fill="#8B949E">Region: India</text>
        
        <defs>
            <linearGradient id="lei_grad" x1="0" y1="0" x2="1" y2="0">
